name: math_curve_loaders_example
description: Manual visual tester for the math_curve_loaders Flutter package.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.12.0
  lucide_icons_flutter: ^3.1.12
  math_curve_loaders:
    path: ../
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces.ttf
        - asset: assets/fonts/Fraunces-Italic.ttf
          style: italic
    - family: InterTight
      fonts:
        - asset: assets/fonts/InterTight.ttf
        - asset: assets/fonts/InterTight-Italic.ttf
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
